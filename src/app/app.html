<main>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8h24v2H4V8zm0 5h24v2H4v-2zm0 5h16v2H4v-2zm0 5h10v2H4v-2zm18-3l8 5-8 5V20z" />
      </svg>
    </div>
    <div>
      <h1>Facturación Electrónica</h1>
      <p class="subtitle">Sistema DIAN — Arquitectura SOAP</p>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" #f="ngForm">

    <!-- Vendedor -->
    <div class="section">
      <h2>Datos del vendedor</h2>
      <div class="grid2">
        <div class="field">
          <label>Identificación vendedor</label>
          <input [(ngModel)]="form.identificacionVendedor" name="identificacionVendedor" required
            placeholder="900123456-7" />
        </div>
        <div class="field">
          <label>Nombre vendedor</label>
          <input [(ngModel)]="form.nombreVendedor" name="nombreVendedor" required
            placeholder="TECNOLOGIAS DIAN S.A.S." />
        </div>
        <div class="field">
          <label>Actividad productiva</label>
          <input [(ngModel)]="form.actividadProductiva" name="actividadProductiva" required
            placeholder="Desarrollo de Software" />
        </div>
        <div class="field">
          <label>Teléfono vendedor</label>
          <input [(ngModel)]="form.telefonoVendedor" name="telefonoVendedor" required placeholder="+57 300 123 4567" />
        </div>
      </div>
      <div class="field">
        <label>Correo vendedor</label>
        <input [(ngModel)]="form.correoVendedor" name="correoVendedor" type="email" required
          placeholder="vendedor@empresa.com" />
      </div>
    </div>

    <!-- Producto -->
    <div class="section">
      <h2>Datos del producto</h2>
      <div class="grid2">
        <div class="field">
          <label>Producto vendido</label>
          <input [(ngModel)]="form.productoVendido" name="productoVendido" required
            placeholder="Licencia de Servidor Cloud" />
        </div>
        <div class="field">
          <label>Código producto</label>
          <input [(ngModel)]="form.codigoProducto" name="codigoProducto" required placeholder="LIC-CLOUD-99" />
        </div>
        <div class="field">
          <label>Precio unitario (COP)</label>
          <input [(ngModel)]="form.precioUnitario" name="precioUnitario" type="number" min="0.01" step="0.01" required
            placeholder="450000" />
        </div>
        <div class="field">
          <label>Cantidad vendida</label>
          <input [(ngModel)]="form.cantidadVendida" name="cantidadVendida" type="number" min="1" step="1" required
            placeholder="3" />
        </div>
      </div>
    </div>

    <!-- Cliente -->
    <div class="section">
      <h2>Datos del cliente</h2>
      <div class="grid2">
        <div class="field">
          <label>Nombre cliente</label>
          <input [(ngModel)]="form.nombreCliente" name="nombreCliente" required placeholder="Alisson Edwin Ltda" />
        </div>
        <div class="field">
          <label>Identificación cliente</label>
          <input [(ngModel)]="form.identificacionCliente" name="identificacionCliente" required
            placeholder="1012345678" />
        </div>
        <div class="field">
          <label>Teléfono cliente</label>
          <input [(ngModel)]="form.telefonoCliente" name="telefonoCliente" required placeholder="+57 315 987 6543" />
        </div>
        <div class="field">
          <label>Correo cliente</label>
          <input [(ngModel)]="form.correoCliente" name="correoCliente" type="email" required
            placeholder="cliente@empresa.com" />
        </div>
      </div>
    </div>

    <!-- Botón -->
    <button type="submit" class="btn-send" [disabled]="loading || f.invalid">
      <span *ngIf="!loading">Generar y enviar factura</span>
      <span *ngIf="loading">Procesando...</span>
    </button>

    <!-- Error -->
    <div class="error-box" *ngIf="errorMsg">
      <strong>Error:</strong> {{ errorMsg }}
    </div>

    <!-- Respuesta -->
    <div class="result-box" *ngIf="response">
      <div class="result-header">
        <span class="badge ok">✓ {{ response.status }}</span>
        <span class="result-msg">{{ response.message }}</span>
      </div>
      <div class="result-grid">
        <span class="k">Número de factura</span>
        <span class="v">{{ response.invoiceNumber }}</span>
      </div>
      <div class="pdf-row" *ngIf="response.pdfBase64">
        <span>PDF generado correctamente</span>
        <button type="button" class="btn-pdf" (click)="descargarPdf()">
          ⬇ Descargar PDF
        </button>
      </div>
    </div>

  </form>
</main>
